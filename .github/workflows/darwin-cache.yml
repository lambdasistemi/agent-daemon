name: Darwin Cache Spider

on:
  workflow_dispatch: {}

concurrency:
  group: darwin-cache
  cancel-in-progress: true

jobs:
  warm-ghc:
    name: Warm GHC for aarch64-darwin
    runs-on: macos-14
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://paolino.cachix.org
            extra-trusted-public-keys = paolino.cachix.org-1:ecmgO3CXdgSWA2cHlm4srknd/cLFMLmK3i3NrzeDFaE=

      - name: Install cachix
        run: nix profile install nixpkgs#cachix

      - name: Build GHC and push to cachix
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          echo "==> Building GHC"
          nix build -L .#devShells.aarch64-darwin.default.ghc --no-link --print-out-paths > /tmp/ghc-out
          echo "==> Pushing to cachix"
          cachix push paolino < /tmp/ghc-out
          echo "==> Done"
