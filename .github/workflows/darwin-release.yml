name: Darwin Release

on:
  pull_request:
    branches: [main]
  push:
    tags: [v*]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: darwin-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-release:
    name: Publish tmux-ws for aarch64-darwin
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Mint a scoped release token
        if: github.event_name == 'push'
        id: release-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: lambdasistemi
          repositories: tmux-ws
          permission-contents: write

      - name: Verify Cabal version and tag mode
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="$(scripts/release/get-cabal-version)"
          if test "$GITHUB_EVENT_NAME" = push; then
            test "$TAG" = "v$version"
            scripts/release/check-version-consistency --mode publish
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://paolino.cachix.org
            extra-trusted-public-keys = paolino.cachix.org-1:ecmgO3CXdgSWA2cHlm4srknd/cLFMLmK3i3NrzeDFaE=

      - name: Build
        run: |
          nix build -L --no-link --print-out-paths > "$RUNNER_TEMP/nix-out"
          test "$(wc -l < "$RUNNER_TEMP/nix-out")" -eq 1
          test -x "$(cat "$RUNNER_TEMP/nix-out")/bin/tmux-ws"

      - name: Bundle and smoke installed layout
        run: |
          bundle="$RUNNER_TEMP/bundle"
          binary="$bundle/bin/tmux-ws"
          libdir="$bundle/libexec/lib"
          staticdir="$bundle/share/tmux-ws/static"
          queue="$RUNNER_TEMP/dylib-queue"
          origins="$RUNNER_TEMP/dylib-origins"

          mkdir -p "$bundle/bin" "$libdir" "$staticdir"
          cp "$(cat "$RUNNER_TEMP/nix-out")/bin/tmux-ws" "$binary"
          cp -RL "$(cat "$RUNNER_TEMP/nix-out")/share/tmux-ws/static/." "$staticdir/"
          test -s "$staticdir/index.html"
          test -s "$staticdir/index.js"
          chmod u+w "$binary"
          : > "$queue"
          : > "$origins"
          printf '%s\n' "$binary" >> "$queue"

          exec 3< "$queue"
          while IFS= read -r target <&3; do
            while IFS= read -r library; do
              case "$library" in
                /usr/lib/*|/System/*) continue ;;
              esac

              if test "$target" != "$binary" && \
                test "$library" = "@rpath/$(basename "$target")"; then
                continue
              fi

              case "$library" in
                @*) printf 'unresolved install name in %s: %s\n' "$target" "$library" >&2; exit 1 ;;
              esac

              test -f "$library"
              libname="$(basename "$library")"
              destination="$libdir/$libname"
              recorded="$(awk -F '\t' -v name="$libname" '$1 == name { print $2; exit }' "$origins")"

              if test -n "$recorded" && test "$recorded" != "$library"; then
                printf 'dylib basename collision: %s and %s\n' "$recorded" "$library" >&2
                exit 1
              fi

              if test -z "$recorded"; then
                printf '%s\t%s\n' "$libname" "$library" >> "$origins"
                cp -L "$library" "$destination"
                chmod u+w "$destination"
                install_name_tool -id "@rpath/$libname" "$destination"
                printf '%s\n' "$destination" >> "$queue"
              fi

              if test "$target" = "$binary"; then
                replacement="@executable_path/../libexec/lib/$libname"
              else
                replacement="@loader_path/$libname"
              fi
              install_name_tool -change "$library" "$replacement" "$target"
            done < <(otool -L "$target" | tail -n +2 | awk '{ print $1 }')
          done
          exec 3<&-

          while IFS= read -r library; do
            codesign --force --sign - "$library"
          done < <(find "$libdir" -type f -print)
          codesign --force --sign - "$binary"

          while IFS= read -r staged; do
            otool -L "$staged"
            if otool -L "$staged" | tail -n +2 | grep -Fq /nix/store/; then
              printf 'unstaged Nix dependency remains in %s\n' "$staged" >&2
              exit 1
            fi
          done < <(find "$bundle/bin" "$libdir" -type f -print)
          "$binary" --help

          server_log="$RUNNER_TEMP/tmux-ws-server.log"
          server_page="$RUNNER_TEMP/tmux-ws-index.html"
          mkdir -p "$RUNNER_TEMP/tmux-ws-base"
          "$binary" --host 127.0.0.1 --port 18081 --base-dir "$RUNNER_TEMP/tmux-ws-base" \
            >"$server_log" 2>&1 &
          server_pid="$!"
          served=false
          for _attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --output "$server_page" http://127.0.0.1:18081/; then
              served=true
              break
            fi
            sleep 1
          done
          kill "$server_pid" 2>/dev/null || true
          wait "$server_pid" 2>/dev/null || true
          if test "$served" != true; then
            cat "$server_log" >&2
            exit 1
          fi
          grep -Fq '<title>tmux-ws</title>' "$server_page"
          grep -Fq 'src="index.js' "$server_page"

      - name: Create tarball
        id: asset
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          asset="$RUNNER_TEMP/tmux-ws-${VERSION}-aarch64-darwin.tar.gz"
          COPYFILE_DISABLE=1 tar -czf "$asset" -C "$RUNNER_TEMP/bundle" .
          sha="$(shasum -a 256 "$asset" | awk '{ print $1 }')"
          printf '%s  %s\n' "$sha" "$(basename "$asset")"
          printf 'path=%s\n' "$asset" >> "$GITHUB_OUTPUT"
          printf 'sha256=%s\n' "$sha" >> "$GITHUB_OUTPUT"

      - name: Upload Darwin review artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmux-ws-darwin-${{ github.sha }}
          path: ${{ steps.asset.outputs.path }}
          retention-days: 30

      - name: Wait for the planner-created GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
          TAG: ${{ github.ref_name }}
        run: |
          for _attempt in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          printf 'planner-created release not visible for %s\n' "$TAG" >&2
          exit 1

      - name: Upload asset to existing release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
          TAG: ${{ github.ref_name }}
          ASSET: ${{ steps.asset.outputs.path }}
        run: gh release upload "$TAG" "$ASSET" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Mint a scoped tap token
        if: github.event_name == 'push'
        id: tap-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: lambdasistemi
          repositories: homebrew-tap
          permission-contents: write

      - name: Update Homebrew tap
        if: github.event_name == 'push'
        env:
          TAP_TOKEN: ${{ steps.tap-token.outputs.token }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.asset.outputs.sha256 }}
        run: |
          url="https://github.com/lambdasistemi/tmux-ws/releases/download/${TAG}/tmux-ws-${VERSION}-aarch64-darwin.tar.gz"

          bash scripts/render-homebrew-formulas.sh \
            "$RUNNER_TEMP" "$url" "$SHA256" "$VERSION"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/lambdasistemi/homebrew-tap.git" "$RUNNER_TEMP/tap"
          mkdir -p "$RUNNER_TEMP/tap/Formula"
          cp "$RUNNER_TEMP/tmux-ws.rb" "$RUNNER_TEMP/tap/Formula/tmux-ws.rb"
          cp "$RUNNER_TEMP/agent-daemon.rb" "$RUNNER_TEMP/tap/Formula/agent-daemon.rb"
          cd "$RUNNER_TEMP/tap"
          git config user.name "lambdasistemi-ci[bot]"
          git config user.email "github-actions@github.com"
          git add Formula/tmux-ws.rb Formula/agent-daemon.rb
          if ! git diff --cached --quiet; then
            git commit -m "update tmux-ws to ${TAG}"
          fi
          git push

      - name: Trust, install, and smoke Homebrew formula
        if: github.event_name == 'push'
        run: |
          brew tap lambdasistemi/tap
          brew trust lambdasistemi/tap
          brew install --formula lambdasistemi/tap/tmux-ws
          test -s "$(brew --prefix tmux-ws)/share/tmux-ws/static/index.html"
          test -s "$(brew --prefix tmux-ws)/share/tmux-ws/static/index.js"
          tmux-ws --help
          command -v tmux-ws
          otool -L "$(command -v tmux-ws)"
