name: Deploy to GitHub Pages

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pages: write
  pull-requests: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Docs build
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build site
        run: |
          nix build --quiet .#site
          mkdir -p site
          cp -R -L result/. site/
          chmod -R u+w site

      - name: Publish pull request preview
        if: github.event_name == 'pull_request'
        uses: paolino/dev-assets/static-preview@main
        with:
          path: site

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: nixos
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: nixos
    steps:
      - name: Clean up pull request preview
        uses: paolino/dev-assets/static-preview@main
        with:
          mode: cleanup
