name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build all derivations
        run: >-
          nix build --quiet
          .#default
          .#devShells.x86_64-linux.default.inputDerivation

  build:
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build
        run: nix build --quiet

      - name: Unit tests
        run: >-
          nix shell nixpkgs#tmux --quiet --command
          nix run .#tests --
          --skip 'Terminal relay'
          --skip 'claude integration'

  build-darwin:
    name: Build (aarch64-darwin)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://paolino.cachix.org
            extra-trusted-public-keys = paolino.cachix.org-1:ecmgO3CXdgSWA2cHlm4srknd/cLFMLmK3i3NrzeDFaE=

      - name: Build
        run: nix build -L

  integration:
    name: Claude Integration Tests
    needs: build
    runs-on: nixos
    environment: claude-tests
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Integration tests
        run: |
          export PATH="/run/current-system/sw/bin:$PATH"
          nix shell nixpkgs#tmux --quiet --command \
            nix run .#tests -- \
            --match 'claude integration' \
            --skip 'resumes conversation'
